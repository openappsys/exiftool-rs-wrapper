[package]
name = "exiftool-rs-wrapper"
version = "0.1.0"
edition = "2024"
authors = ["Your Name <your.email@example.com>"]
description = "A Rust wrapper for ExifTool"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/exiftool-rs-wrapper"
keywords = ["exif", "metadata", "exiftool", "wrapper"]
categories = ["multimedia::images", "api-bindings"]
rust-version = "1.85.0"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

[dev-dependencies]
tempfile = "3.0"
