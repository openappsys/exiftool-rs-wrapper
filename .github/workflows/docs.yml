name: 文档部署

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '**.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建文档
  build:
    name: 构建文档
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装依赖
        uses: ryankurte/action-apt@v1
        with:
          packages: libimage-exiftool-perl

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-docs-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 构建文档
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings --cfg docsrs"

      - name: 创建 index.html
        run: |
          cat > target/doc/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; URL=exiftool_rs_wrapper/index.html">
              <title>ExifTool Rust Wrapper Documentation</title>
          </head>
          <body>
              <p>Redirecting to <a href="exiftool_rs_wrapper/index.html">documentation</a>...</p>
          </body>
          </html>
          EOF

      - name: 添加自定义域名 (如果使用)
        if: env.CUSTOM_DOMAIN != ''
        run: echo "${{ env.CUSTOM_DOMAIN }}" > target/doc/CNAME
        env:
          CUSTOM_DOMAIN: ${{ vars.DOCS_CUSTOM_DOMAIN }}

      - name: 上传文档产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  # 部署到 GitHub Pages
  deploy:
    name: 部署文档
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 失败通知
  notify:
    name: 失败通知
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: 发送失败通知
        uses: 8398a7/action-slack@v3
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          status: failure
          channel: '#docs'
          text: |
            文档部署失败！
            
            项目: ${{ github.repository }}
            分支: ${{ github.ref_name }}
            提交: ${{ github.sha }}
            
            查看日志: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # 成功通知
  notify-success:
    name: 成功通知
    needs: deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: 发送成功通知
        uses: 8398a7/action-slack@v3
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          status: success
          channel: '#docs'
          text: |
            文档部署成功！
            
            项目: ${{ github.repository }}
            文档地址: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
